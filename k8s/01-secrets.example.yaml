# ⚠️ ESTE ARQUIVO É SÓ UM TEMPLATE DE REFERÊNCIA. NÃO faça `kubectl apply`
# nele com valores reais, e NUNCA versione um Secret com senha de verdade
# no Git. O jeito certo de criar esses Secrets está no README.md desta
# pasta (usando `kubectl create secret generic` na linha de comando, que
# não deixa a senha em nenhum arquivo rastreado pelo Git).
#
# Isso aqui só documenta QUAIS chaves cada Secret precisa ter.

apiVersion: v1
kind: Secret
metadata:
  name: ngo-db-secret
  namespace: solidarytech
type: Opaque
stringData:
  DATABASE_URL: "postgres://SEU_USUARIO:SUA_SENHA@SEU_RDS_ENDPOINT:5432/ngo_db"
---
apiVersion: v1
kind: Secret
metadata:
  name: donation-db-secret
  namespace: solidarytech
type: Opaque
stringData:
  DATABASE_URL: "postgres://SEU_USUARIO:SUA_SENHA@SEU_RDS_ENDPOINT:5432/donation_db"
